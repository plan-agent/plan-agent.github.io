<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报名数据管理 - 普蓝 OPC+Agent 双创营</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2563eb;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-label {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #2563eb;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8fafc;
        }

        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: #475569;
            font-size: 14px;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
            color: #334155;
        }

        tr:hover {
            background: #f8fafc;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .filter-bar {
            background: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: #2563eb;
        }

        @media (max-width: 768px) {
            .table-container {
                overflow-x: auto;
            }

            table {
                min-width: 800px;
            }
        }

        .timestamp {
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 报名数据管理</h1>
            <p style="color: #64748b; font-size: 14px; margin-top: 8px;">普蓝 OPC+Agent 技能培训双创营</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">总报名人数</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">今日新增</div>
                <div class="stat-value" id="todayCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">自带电脑</div>
                <div class="stat-value" id="laptopCount">0</div>
            </div>
        </div>

        <div class="filter-bar">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="🔍 搜索姓名、学号、学院、专业、微信号..."
            >
        </div>

        <div class="actions">
            <button class="btn btn-success" onclick="exportToExcel()">📥 导出 Excel</button>
            <button class="btn btn-primary" onclick="exportToJSON()">💾 导出 JSON</button>
            <button class="btn btn-primary" onclick="exportToGitHubIssues()">🔄 导出到 GitHub Issues</button>
            <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清空数据</button>
            <button class="btn btn-primary" onclick="refreshData()">🔄 刷新</button>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>姓名</th>
                        <th>学号</th>
                        <th>学院</th>
                        <th>专业</th>
                        <th>年级</th>
                        <th>自带电脑</th>
                        <th>微信号</th>
                        <th>提交时间</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="9" class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                            <p>暂无报名数据</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allData = [];

        // 加载数据
        function loadData() {
            const data = localStorage.getItem('registrations');
            allData = data ? JSON.parse(data) : [];
            return allData;
        }

        // 渲染表格
        function renderTable(data = allData) {
            const tbody = document.getElementById('tableBody');
            
            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9" class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                            <p>暂无报名数据</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = data.map((item, index) => {
                const date = new Date(item.timestamp);
                const formattedDate = date.toLocaleString('zh-CN');
                
                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${item.name || '-'}</strong></td>
                        <td>${item.studentId || '-'}</td>
                        <td>${item.college || '-'}</td>
                        <td>${item.major || '-'}</td>
                        <td>${item.grade || '-'}</td>
                        <td>${item.laptop || '-'}</td>
                        <td>${item.wechat || '-'}</td>
                        <td class="timestamp">${formattedDate}</td>
                    </tr>
                `;
            }).join('');
        }

        // 更新统计
        function updateStats() {
            const total = allData.length;
            document.getElementById('totalCount').textContent = total;

            // 今日新增
            const today = new Date().toDateString();
            const todayCount = allData.filter(item => {
                const itemDate = new Date(item.timestamp).toDateString();
                return itemDate === today;
            }).length;
            document.getElementById('todayCount').textContent = todayCount;

            // 自带电脑人数
            const laptopCount = allData.filter(item => item.laptop === '是').length;
            document.getElementById('laptopCount').textContent = laptopCount;
        }

        // 搜索过滤
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const filtered = allData.filter(item => {
                return Object.values(item).some(value => 
                    String(value).toLowerCase().includes(keyword)
                );
            });
            renderTable(filtered);
        });

        // 导出 Excel（CSV格式）
        function exportToExcel() {
            if (allData.length === 0) {
                alert('暂无数据可导出');
                return;
            }

            const headers = ['序号', '姓名', '学号', '学院', '专业', '年级', '自带电脑', '微信号', '提交时间'];
            const rows = allData.map((item, index) => [
                index + 1,
                item.name,
                item.studentId,
                item.college,
                item.major,
                item.grade,
                item.laptop,
                item.wechat,
                new Date(item.timestamp).toLocaleString('zh-CN')
            ]);

            let csv = '\uFEFF'; // BOM for UTF-8
            csv += headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.map(cell => `"${cell}"`).join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `报名数据_${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
        }

        // 导出 JSON
        function exportToJSON() {
            if (allData.length === 0) {
                alert('暂无数据可导出');
                return;
            }

            const dataStr = JSON.stringify(allData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `报名数据_${new Date().toISOString().slice(0, 10)}.json`;
            link.click();
        }

        // 清空数据
        function clearAllData() {
            if (confirm('确定要清空所有报名数据吗？此操作不可恢复！')) {
                if (confirm('再次确认：真的要删除所有数据吗？')) {
                    localStorage.removeItem('registrations');
                    allData = [];
                    renderTable();
                    updateStats();
                    alert('数据已清空');
                }
            }
        }

        // 导出到 GitHub Issues
        function exportToGitHubIssues() {
            if (allData.length === 0) {
                alert('暂无数据可导出');
                return;
            }

            const repo = 'plan-agent/plan-agent.github.io';
            let markdown = `# 批量创建 GitHub Issues 指南\n\n`;
            markdown += `将以下数据提交到 GitHub Issues，每条报名信息创建一个 Issue。\n\n`;
            markdown += `仓库：https://github.com/${repo}/issues\n\n`;
            markdown += `---\n\n`;

            allData.forEach((item, index) => {
                markdown += `## Issue ${index + 1}: 【报名】${item.name} - ${item.studentId}\n\n`;
                markdown += `**标签**: \`报名\`, \`待处理\`\n\n`;
                markdown += `**内容**:\n\n`;
                markdown += `\`\`\`markdown\n`;
                markdown += `## 报名信息\n\n`;
                markdown += `**报名时间**：${new Date(item.timestamp).toLocaleString('zh-CN')}\n\n`;
                markdown += `---\n\n`;
                markdown += `### 基本信息\n`;
                markdown += `- **姓名**：${item.name}\n`;
                markdown += `- **学号**：${item.studentId}\n`;
                markdown += `- **学院**：${item.college}\n`;
                markdown += `- **专业**：${item.major}\n`;
                markdown += `- **年级**：${item.grade}\n\n`;
                markdown += `### 其他信息\n`;
                markdown += `- **是否自带笔记本电脑**：${item.laptop}\n`;
                markdown += `- **微信号**：${item.wechat}\n\n`;
                markdown += `---\n\n`;
                markdown += `> 此报名信息由报名系统自动生成\n`;
                markdown += `\`\`\`\n\n`;
                markdown += `---\n\n`;
            });

            // 下载为 markdown 文件
            const blob = new Blob([markdown], { type: 'text/markdown;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `GitHub_Issues_导入_${new Date().toISOString().slice(0, 10)}.md`;
            link.click();

            alert(`已导出 ${allData.length} 条报名信息。\n\n请访问 GitHub 仓库手动创建 Issues，或使用自动化工具批量导入。`);
        }

        // 刷新数据
        function refreshData() {
            loadData();
            renderTable();
            updateStats();
        }

        // 初始化
        loadData();
        renderTable();
        updateStats();
    </script>
</body>
</html>
